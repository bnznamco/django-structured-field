name: 🧪 Test and Coverage

on:
  workflow_dispatch:
  pull_request:
    branches: [ master, next ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        django-version: ["4.2", "5.0", "5.1", "5.2"]
        exclude:
          # Django 4.2 doesn't support Python 3.13+
          - python-version: "3.13"
            django-version: "4.2"
          - python-version: "3.14"
            django-version: "4.2"
          # Django 5.0 doesn't support Python 3.13+
          - python-version: "3.13"
            django-version: "5.0"
          - python-version: "3.14"
            django-version: "5.0"
          # Django 5.1 doesn't support Python 3.14
          - python-version: "3.14"
            django-version: "5.1"
            
    name: 🦠 Test on Python ${{ matrix.python-version }} with Django ${{ matrix.django-version }}

    steps:
    - uses: actions/checkout@v6
    
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        
    - name: 📦 Install dependencies 
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install "Django~=${{ matrix.django-version }}.0"
        
    - name: 🔬 Test with pytest and calculate coverage 
      run: make test
      
    - name: 📦 Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-python-${{ matrix.python-version }}-django-${{ matrix.django-version }}
        path: |
          coverage.xml
          .coverage
        include-hidden-files: true

  upload-coverage:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v6
    
    - name: 📥 Download coverage artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: coverage-*
        path: coverage-reports/
        
    - name: 🩺 Upload coverage to codecov.io
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        fail_ci_if_error: true
        verbose: true